<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INNOVA Brand Guidelines</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Space+Mono&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', system-ui, sans-serif; background: #FAF7F3; color: #191919; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .container { text-align: center; max-width: 440px; padding: 48px 32px; }
  h1 { font-family: 'Fraunces', serif; font-size: 28px; font-weight: 600; margin-bottom: 12px; letter-spacing: -0.02em; }
  p { font-size: 14px; color: #9A958F; line-height: 1.6; margin-bottom: 8px; }
  .mono { font-family: 'Space Mono', monospace; font-size: 11px; color: #C5C1BB; margin-top: 24px; }
  .dots { display: flex; gap: 8px; justify-content: center; margin-top: 20px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; }
</style>
</head>
<body>
<div class="container">
  <h1>Brand Guidelines</h1>
  <p>The complete INNOVA AM Tech brand identity system.</p>
  <p>To display the full guidelines document, place the HTML file at:</p>
  <p class="mono">public/innova-brand-guidelines.html</p>
  <div class="dots">
    <div class="dot" style="background:#D4772E"></div>
    <div class="dot" style="background:#2D4272"></div>
    <div class="dot" style="background:#3D6B4F"></div>
  </div>
</div>
</body>
</html>
